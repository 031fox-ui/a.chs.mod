[PauseMenu/Image/Text]
"Sleep, those little slices of death. How I loathe them." = "“睡眠，那一段段小小的死亡，我是何其憎惡。”"
"Also try Custom Structures!" = "“也試試 Custom Structures 吧！”"
"Also try CUCoreLib!" = "“也試試 CUCoreLib 吧！”"
"Those burial-clouds that lower victorious soon to devour all" = "“那低垂的葬雲，以凱旋之姿迫近，轉瞬將吞噬萬物”"
"This shall be a story like none other before." = "“這將是一個前無古人的故事。”"
"I had planned my life's endeavor" = "“我曾為一生的事業精心籌謀”"
"but my life had plans for me." = "“可我的人生對我另有安排。”"
"I am lost but not forever," = "“我雖迷失，卻非永世，”"
"I am where I am meant to be." = "“我正身處命定之地。”"
"Imagine now unbearably, how unutterly cold the universe would be if one is all alone." = "“此刻試想，那不堪忍受、無以言表的寒冷——若你孤身一人，宇宙便是如此。”"
"There's really no hard limit to how long these pause menu names can be and to be quite honest I'm rather curious to see how far we can go. Adolphus W. Green (1844–1917) started as the Principal of the Groton School in 1864. By 1865, he became second assistant librarian - oh wait nevermind there' a limit." = "“其實暫停菜單的文字並沒有真正的硬性長度限制，老實說，我挺好奇究竟能寫多長。阿道弗斯·W·格林（1844–1917）於 1864 年開始擔任格羅頓學校校長，到 1865 年，他當上了第二助理圖書管理員——哦等等，算了，看來還是有限制的。”"
"Astralsounds" = "星籟"
"Everything will be okay." = "“一切都會沒事的。”"
"Remember to do an act of good today." = "“記得今天要做一件善事。”"
"Pause and hydrate. It'll help." = "“暫停一下，喝點水。會有幫助的。”"
"Don't forget to eat, now..." = "“別忘了吃點東西，好嗎...”"
"Little one." = "“小傢伙。”"
"You're almost there. Just a couple more steps." = "“你就快到了，再多走幾步。”"
"To the north, a new future." = "“向北方去，一片嶄新的未來。”"
"To reach the antechamber." = "“只為抵達前廳。”"
"To remember, to forget. To forget, to remember." = "“去銘記，去遺忘。去遺忘，再去銘記。”"
"Take care of yourself. You deserve it." = "“照顧好自己，你值得被善待。”"
"From now on you’re going to have to think. There’s a reason why we’re born with brains in our heads, not rocks." = "“從現在起，你可得動腦子了。我們生來腦袋裡裝的是大腦而非石頭，並非毫無緣由。”"
"Remember the past, live in the present, and fear not the future, for it doesn't exist and never shall. There is only now" = "“銘記過往，活在當下，莫懼未來，因為未來並不存在，也永不存在。只有現在。”"
"Change itself is nether good nor bad, but knowledge is always useful." = "“變化本身非善非惡，但知識永遠有益。”"
"Then I shall keep myself, to myself." = "“那我便將自我守住，只交予自身。”"
"Do questions not taste best in the absence of answers?" = "“問題不正是因為沒有答案時，才最令人回味嗎？”"
"In the silent, hidden spaces where we watch and wait, we see the artistry of all that is." = "“在那寂靜隱秘的角落，我們守望等待，得見萬物的匠心。”"
"When a being dies, a world dies." = "“一命逝去，一界隨之消亡。”"
"Never is a very, very long time." = "“‘永遠’，是一段很久、很久的時間。”"
"We're all just stories in the end, so let's make ours a good one." = "“到頭來，我們都只不過是故事罷了。既然如此，就讓我們的故事精彩一些吧。”"
"You cannot retreat from this fight. Stand with pride and fight with honor." = "“此戰無路可退，驕傲地挺立，光榮地戰鬥吧。”"
"...to have turned the wheel and approached genius..." = "“...轉動了命運之輪，向天才之境靠近...”"
"We are creatures of habit." = "“我們是習慣的造物。”"
"Fear is a good servant, but a poor leader." = "“恐懼是個好僕從，卻是個糟糕的主宰。”"
"Wisdom is neither a knowing nor a finding but rather a seeking." = "“智慧並非已知，亦非已得，而是無盡的追尋。”"
"A box without hinges, key, or lid, yet golden treasure inside is hid." = "“無鉸無鑰也無蓋，內裡卻藏金色寶藏。”"
"One learns more from defeat than victory. Therefore, fear the general that has never won a battle." = "“人從失敗中學到的，遠多於從勝利中學到的。因此，要畏懼那未嘗一勝的將軍。”"
"The price of entry to being good at something is to suck at that something." = "“把一件事做得糟糕透頂，正是擅長它的入場券。”"
"Death is only the end if you think the story is about you." = "“如果你認為這故事只關乎你時，死亡才是終點。”"
"If you bring only these quotes, then it will be bereft of the meaning and lesson. You must seek these lessons and live them." = "“若你只帶來這些語錄，便會失了其中的意義與教誨。你須得親自求索，並親身踐行。”"
"The gods envy us, because of our mortality. Death is what makes everything worthwhile and beautiful." = "“眾神因我們終有一死而嫉妒我們。正是死亡，賦予萬物意義與至美。”"
"When they speak, they shake the very earth." = "“他們開口之時，大地也為之震顫。”"
"Don't be afraid. Jump." = "“別怕，跳吧。”"
"Un du evarínya ono varda." = "“願星辰守護你。”"
