[概要]
"GUID" = "net.cucorelib"
"翻译版本" = "1.0.0"
"模组版本" = "1.0.3"
[Console]
"Spawns all items from a given loot pool with zero gravity." = "【CUCoreLib】從指定戰利品池中生成所有物品（零重力）"
"Spawns a vanilla prefab or CUCoreLib-registered item/building." = "【CUCoreLib】生成原版預設物體或 CUCoreLib 註冊的物品/建築"
"Places a vanilla or CUCoreLib-registered tile at the chosen block position." = "【CUCoreLib】在指定方塊位置放置原版或 CUCoreLib 註冊的物塊"
"Writes or updates CUCoreLib generated locale data. WARNING: Overrides EN.json" = "【CUCoreLib】寫入或更新 CUCoreLib 生成的本地化數據。警告 : 會覆蓋 EN.json"
"Prints the loaded BepInEx plugin list to the in-game console and Unity log." = "【CUCoreLib】將已加載的 BepInEx 插件列表打印到遊戲內控制檯和 Unity 日誌"
"Strictly reloads item/liquid/recipe/locale content from a rebuilt mod DLL." = "【CUCoreLib】從重新構建的模組 DLL 嚴格重載物品/液體/配方/本地化內容"
"Enables automatic hot reloading after detecting a loaded mod DLL file change." = "【CUCoreLib】檢測到已加載模組 DLL 文件變化後啟用自動熱重載"
"Manages a live top-right overlay of watched static fields for runtime debugging." = "【CUCoreLib】管理運行時調試的右上角靜態字段監視覆蓋層"
"category" = "類別"
"The ID of the category to spawn from." = "要生成物品的類別 ID"
"position" = "位置"
"Where to spawn the item" = "物品生成位置"
"Spawn position." = "生成位置"
"Tile position." = "地塊位置"
"modGUID" = "模組GUID"
"Optional BepInEx plugin GUID filter for the modded category. Use normal for no filter." = "（可選）模組類別的 BepInEx 插件 GUID 過濾器。使用 normal 表示不過濾"
"id" = "ID"
"Item or object ID." = "物品或對象 ID"
"condition" = "耐久"
"Item condition." = "物品耐久"
"count" = "數量"
"Number of objects to spawn." = "要生成的對象數量"
"tileIndex" = "地塊索引"
"Vanilla or registered custom tile index." = "原版或註冊的自定義地塊索引"
"path" = "路徑"
"Optional output path. Defaults to BepInEx/config/CUCoreLib/Locales/EN.json." = "（可選）輸出路徑。默認為 BepInEx/config/CUCoreLib/Locales/EN.json"
"modGuid" = "模組GUID"
"BepInEx plugin GUID to strictly reload from a rebuilt DLL." = "要從重新構建的 DLL 嚴格重載的 BepInEx 插件 GUID"
"BepInEx plugin GUID that previously called ContentReloadManager.EnableHotReload(GUID)." = "先前調用過 ContentReloadManager.EnableHotReload(GUID) 的 BepInEx 插件 GUID"
"enable" = "啟用"
"true to enable watch mode for that DLL, false to disable it." = "true 啟用該 DLL 的監視模式，false 禁用它"
"action" = "操作"
"add, remove, list, clear, show, or hide." = "add添加、remove移除、list列出、clear清除、show顯示 或 hide隱藏"
"Type.member" = "類型.成員"
"Reflected static field to watch, such as Namespace.Plugin.healthRate." = "要監視的反射靜態字段，例如 Namespace.Plugin.healthRate"
"created locale at " = ""已創建本地化文件於 "  # 動態路徑拼接，前綴匹配"
"Debug watch overlay hidden." = "調試監視覆蓋層已隱藏"
"Debug watch overlay shown." = "調試監視覆蓋層已顯示"
"Cleared all debug watches." = "已清除所有調試監視"
"No active debug watches." = "沒有活躍的調試監視"
"Reloaded " = ""已重載 "  # "Reloaded {filename}!" 前綴匹配"
"Spawned all items from category \"{0}\" at {1}." = "已在 {1} 生成類別「{0}」的所有物品"
"Placed tile {0} ({1}) at {2},{3}." = "已在 {2},{3} 放置地塊 {0}（{1}）"
"Loaded mods ({0}):" = "已加載的模組（共 {0} 個） : "
"Active debug watches ({0}) - overlay {1}:" = "活躍的調試監視（{0} 個）- 覆蓋層 : {1}"
"Usage: spawncategory [category] [position] [modGUID]" = "用法 : spawncategory [類別] [位置] [模組GUID]"
"Usage: cuspawn [id]" = "用法 : cuspawn [ID]"
"Usage: settile [tileIndex] [position]" = "用法 : settile [地塊索引] [位置]"
"Usage: reloadcontent [modGuid]" = "用法 : reloadcontent [模組GUID]"
"Usage: autohotreload [modGuid] [enable]" = "用法 : autohotreload [模組GUID] [啟用]"
"Usage: debugwatch [add|remove|list|clear|show|hide] [Type.member]" = "用法 : debugwatch [add|remove|list|clear|show|hide] [類型.成員]"
"Usage: debugwatch add [Type.member]" = "用法 : debugwatch add [類型.成員]"
"Usage: debugwatch remove [Type.member]" = "用法 : debugwatch remove [類型.成員]"
"Invalid item category \"{0}\"." = "無效的物品類別「{0}」"
"Could not find entity '{0}'." = "找不到實體「{0}」"
"'{0}' is not a valid tile index." = "「{0}」不是有效的地塊索引"
"Tile index '{0}' is not registered." = "地塊索引「{0}」未註冊"
"Failed to place tile '{0}' at block {1}." = "在方塊 {1} 放置地塊「{0}」失敗"
"Enable must be 'true' or 'false'." = "啟用值必須為 true 或 false"
"Unknown debugwatch action '{0}'." = "未知的 debugwatch 操作「{0}」"