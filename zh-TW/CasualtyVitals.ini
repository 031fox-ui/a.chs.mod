[概要]
"GUID" = "CasualtyVitals"
"翻译版本" = "1.1.0"
"模组版本" = "1.1.1"
[Console]
"Sets a Casualty Vitals body test field on the player body." = "【Casualty Vitals】在玩家身體上設置一個 Casualty Vitals 身體測試字段"
"Logs a Casualty Vitals body test field from the player body." = "【Casualty Vitals】從玩家身體記錄一個 Casualty Vitals 身體測試字段"
"Lists Casualty Vitals body test fields." = "【Casualty Vitals】列出 Casualty Vitals 身體測試字段"
"Casualty Vitals test field" = "Casualty Vitals 測試字段"
"Value to set or dose amount in mL" = "要設置的值或劑量 mL"
"Optional duration for timed signal modifiers." = "（可選）定時信號修飾符的持續時間"
"CV {0} = {1}" = "CV {0} = {1}"
"CV applied {0} mL via {1}." = "已通過 {1} 施用 {0}mL"
"CV {0} = {1} for {2}s" = "CV {0} = {1}，持續 {2}秒"
"CV settable fields: {0}. Read-only: medicationOverdoseLevel." = "CV 可設置字段 : {0}。只讀 : medicationOverdoseLevel"
"Usage: cvsetbodyfield <field> <value> [seconds]" = "用法 : cvsetbodyfield <字段> <數值> [秒數]"
"Usage: cvgetbodyfield <field>" = "用法 : cvgetbodyfield <字段>"
"No player body is available." = "沒有可用的玩家身體"
"Could not parse \"{0}\" as a float." = "無法將「{0}」解析為浮點數"
"Unknown CV body field \"{0}\". Use cvlistbodyfields." = "未知的 CV 身體字段「{0}」。使用 cvlistbodyfields"
"Unknown or write-only CV body field \"{0}\". Use cvlistbodyfields." = "未知或只寫的 CV 身體字段「{0}」。使用 cvlistbodyfields"
[main]
# Original: Calcium Gluconate Solution
"cv_calcium_gluconate_solution" = "葡萄糖酸鈣溶液"
# Original: Green-white electrolyte solution used to stabilize dangerous hyperkalemia. Oral use takes about 14 mL; injecting more than about 30 mL can cause overdose.
"cv_calcium_gluconate_solutiondsc" = "綠白色電解質溶液，用於穩定危險的高鉀血癥。口服約需14mL；注射超過約30mL可能過量。"
# Original: Calcitonin Solution
"cv_calcitonin_solution" = "降鈣素溶液"
# Original: Peach-colored solution used to counter hypercalcemia after electrolyte treatment overdose. Oral use takes about 14 mL; injecting more than about 30 mL can cause overdose.
"cv_calcitonin_solutiondsc" = "桃色溶液，用於對抗電解質治療過量後的高鈣血癥。口服約需14mL；注射超過約30mL可能過量。"
# Original: Calcium Gluconate Solution (alternative key)
"cv_calcium_gluconate" = "葡萄糖酸鈣溶液"
# Original: Green-white electrolyte solution used to stabilize dangerous hyperkalemia. Oral use takes about 14 mL; injecting more than about 30 mL can cause overdose.
"cv_calcium_gluconate_dsc" = "綠白色電解質溶液，用於穩定危險的高鉀血癥。口服約需14mL；注射超過約30mL可能過量。"
