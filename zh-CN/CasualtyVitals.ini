[概要]
"GUID" = "CasualtyVitals"
"翻译版本" = "1.1.0"
"模组版本" = "1.1.1"
[Console]
"Sets a Casualty Vitals body test field on the player body." = "【Casualty Vitals】在玩家身体上设置一个 Casualty Vitals 身体测试字段"
"Logs a Casualty Vitals body test field from the player body." = "【Casualty Vitals】从玩家身体记录一个 Casualty Vitals 身体测试字段"
"Lists Casualty Vitals body test fields." = "【Casualty Vitals】列出 Casualty Vitals 身体测试字段"
"Casualty Vitals test field" = "Casualty Vitals 测试字段"
"Value to set or dose amount in mL" = "要设置的值或剂量 mL"
"Optional duration for timed signal modifiers." = "（可选）定时信号修饰符的持续时间"
"CV {0} = {1}" = "CV {0} = {1}"
"CV applied {0} mL via {1}." = "已通过 {1} 施用 {0}mL"
"CV {0} = {1} for {2}s" = "CV {0} = {1}，持续 {2}秒"
"CV settable fields: {0}. Read-only: medicationOverdoseLevel." = "CV 可设置字段 : {0}。只读 : medicationOverdoseLevel"
"Usage: cvsetbodyfield <field> <value> [seconds]" = "用法 : cvsetbodyfield <字段> <数值> [秒数]"
"Usage: cvgetbodyfield <field>" = "用法 : cvgetbodyfield <字段>"
"No player body is available." = "没有可用的玩家身体"
"Could not parse \"{0}\" as a float." = "无法将「{0}」解析为浮点数"
"Unknown CV body field \"{0}\". Use cvlistbodyfields." = "未知的 CV 身体字段「{0}」。使用 cvlistbodyfields"
"Unknown or write-only CV body field \"{0}\". Use cvlistbodyfields." = "未知或只写的 CV 身体字段「{0}」。使用 cvlistbodyfields"
[main]
# Original: Calcium Gluconate Solution
"cv_calcium_gluconate_solution" = "葡萄糖酸钙溶液"
# Original: Green-white electrolyte solution used to stabilize dangerous hyperkalemia. Oral use takes about 14 mL; injecting more than about 30 mL can cause overdose.
"cv_calcium_gluconate_solutiondsc" = "绿白色电解质溶液，用于稳定危险的高钾血症。口服约需14mL；注射超过约30mL可能过量。"
# Original: Calcitonin Solution
"cv_calcitonin_solution" = "降钙素溶液"
# Original: Peach-colored solution used to counter hypercalcemia after electrolyte treatment overdose. Oral use takes about 14 mL; injecting more than about 30 mL can cause overdose.
"cv_calcitonin_solutiondsc" = "桃色溶液，用于对抗电解质治疗过量后的高钙血症。口服约需14mL；注射超过约30mL可能过量。"
# Original: Calcium Gluconate Solution (alternative key)
"cv_calcium_gluconate" = "葡萄糖酸钙溶液"
# Original: Green-white electrolyte solution used to stabilize dangerous hyperkalemia. Oral use takes about 14 mL; injecting more than about 30 mL can cause overdose.
"cv_calcium_gluconate_dsc" = "绿白色电解质溶液，用于稳定危险的高钾血症。口服约需14mL；注射超过约30mL可能过量。"
