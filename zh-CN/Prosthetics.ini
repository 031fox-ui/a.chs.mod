# Original: Cybernetic Eye
"prosthetic_eye" = "电子义眼"
# Original: A battery-powered eye. Restores sight in one socket while it has charge. Press F to activate light mode.\n\nIn wound view: any tool (knife, screwdriver, etc) ejects the battery — wrench rips out the whole eye.
"prosthetic_eyedsc" = "一只由电池驱动的眼睛。在有电时可以恢复一侧眼眶的视力。按F键激活照明模式。\n\n在医疗面板中：使用任何工具（小刀、螺丝刀等）可弹出电池——使用扳手会扯出整只眼睛。"
# Original: Pain Blocker
"neuromod_painblock" = "止痛模块"
# Original: Suppresses nerve pain signals  - all incoming pain is halved while installed.\n\n<color="red">Ejecting this neuromod is dangerous. Expect brain flash and vomiting.
"neuromod_painblockdsc" = "抑制神经疼痛信号——安装后受到的所有疼痛减半。\n\n<color=\"red\">弹出此神经模组非常危险。预计会导致脑闪和呕吐。"
# Original: Trap Detector
"neuromod_trapdetect" = "陷阱探测器"
# Original: Highlights all nearby traps with a red glow. Beartraps, landmines, coils and more.\n\n<color="red">Ejecting this neuromod is dangerous. Expect brain flash and vomiting.
"neuromod_trapdetectdsc" = "用红色光芒高亮标记附近的所有陷阱。包括捕兽夹、地雷、线圈等。\n\n<color=\"red\">弹出此神经模组非常危险。预计会导致脑闪和呕吐。"
# Original: Sonic Screamer Neuromod
"neuromod_sonicscreamer" = "声波尖啸器神经模组"
# Original: Allows the player to release a powerful sonic shockwave to push back and stun nearby enemies.
"neuromod_sonicscreamerdsc" = "允许玩家释放强大的声波冲击波，以击退并晕眩附近的敌人。"
# Original: Masochist Neuromod
"neuromod_crackedpainmod" = "受虐狂神经模组"
# Original: A damaged pain neuromod, clearly ripped from someone else. Pain hurts 10% more with it in, but you start enjoying it  - mood rises passively the more you hurt.\n\n<color="red">Removing this neuromod deals 5 brain damage, a brain flash, and 15 head pain.
"neuromod_crackedpainmoddsc" = "一个受损的痛觉神经模组，显然是从别人身上强行剥离出来的。安装后疼痛感增加10%，但你会开始享受它——你受到的痛苦越多，情绪值就会被动提升。\n\n<color=\"red\">移除此神经模组会造成5点脑损伤、一次脑闪和15点头部疼痛。"
# Original: Adrenaline Surge Neuromod
"neuromod_adrenalinesurge" = "肾上腺素激增神经模组"
# Original: Triggers a strong adrenaline surge to temporarily improve survivability when actively activated or in a crisis state.
"neuromod_adrenalinesurgedsc" = "主动激活或处于危机状态时，触发强烈的肾上腺素激增以暂时提高生存能力。"
# Original: Sandevistan Neuromod
"neuromod_sandivistian" = "斯安威斯坦神经模组"
# Original: A neural mod implanted in the brain, allowing the player to greatly increase reaction and action speed for a short duration.
"neuromod_sandivistiandsc" = "一种植入大脑的神经模组，允许玩家在短时间内大幅度提升反应和行动速度。"
# Original: Scanning Neuromod
"neuromod_scanningchip" = "扫描神经模组"
# Original: Hold an item and activate to scan it for 3 seconds. Reveals the recipe and marks the item type as recognized for good.\n\n<color="green">Safe to eject  - no side effects.
"neuromod_scanningchipdsc" = "手持物品并激活以对其扫描3秒。解明其配方并将该物品类型永久标记为已识别。\n\n<color=\"green\">安全弹出——无副作用。"
# Original: Steady Hand Augment
"augment_steadyhand" = "稳手插件"
# Original: Fine-tunes the arm stability, significantly reducing weapon recoil and improving operational accuracy.
"augment_steadyhanddsc" = "微调手臂稳定性，显著降低武器后坐力并提高操作精准度。"
# Original: Power Grip Augment
"augment_powergrip" = "强力握持插件"
# Original: Enhances hand and arm grip strength, allowing climbing or grabbing heavy objects firmly.
"augment_powergripdsc" = "增强手部和手臂的握持力量，允许进行攀爬或牢牢抓住沉重物体。"
# Original: Hacking Augment
"augment_hacking" = "多功能黑客插件"
# Original: Integrates a wireless hacking interface in the hand, allowing remote hacking of various electronic systems and terminals.
"augment_hackingdsc" = "在手部集成无线黑客接口，允许远程破解各种电子系统和终端。"
# Original: Augment Implant Tool
"augment_implant_tool" = "增强件植入工具"
# Original: Cuts a single augment socket into a biological arm or leg — run augments without going full prosthetic. Use in the wound view on a Shoulder or Thigh.\n\n<color="red">Single use. Slot is gone the moment the limb is severed.
"augment_implant_tooldsc" = "在生物手臂或腿部上切出一个单独的增强件插槽——无需进行完全的义肢替换即可运行增强件。在医疗面板中对肩膀或大腿使用。\n\n<color=\"red\">一次性使用。肢体被切断后该插槽会消失。"
# Original: Power Steps Augment
"augment_powersteps" = "动力步伐增强件"
# Original: Reinforces leg muscles, enabling the player to run faster and jump higher.
"augment_powerstepsdsc" = "强化腿部肌肉，使玩家能够跑得更快、跳得更高。"
# Original: Bone Saw
"bonesaw" = "骨锯"
# Original: A proper surgical bone saw. The right tool for a clean cut.\n\n<color="red">Can be used in the health panel to amputate any limb, even without infection or damage.
"bonesawdsc" = "一把正规的手术骨锯。是进行干净利落切割的正确工具。\n\n<color=\"red\">可在医疗面板中使用以截除任何肢体，即使没有受到感染或损伤。"
# Original: Makeshift Bone Saw
"makeshiftbonesaw" = "简易骨锯"
# Original: A crude improvised bone saw. Gets the job done, barely.\n\n<color="red">Can be used in the health panel to amputate any limb, even without infection or damage.
"makeshiftbonesawdsc" = "一把粗糙的临时自制骨锯。勉强能把工作搞定。\n\n<color=\"red\">可在医疗面板中使用以截除任何肢体，即使没有受到感染或损伤。"
# Original: A strip of clean bandage cloth. Absorbs 25 wetness per use when used from inventory. 10 uses. Also works as a proper dressing on wounds.
"rippeddressingdsc" = "一条干净的绷带布。在物品栏中使用时，每次使用能吸收25点潮湿度。可使用10次。也可用作伤口的正规敷料。"
# Original: Plastic Fork
"plasticfork" = "塑料叉子"
# Original: I mean, it would be funny to poke an eye out from your friend or yourself to make space for the cool prosthetic eye, right? One use.\n\n<color="red">Drag onto your head in the health panel to remove a biological eye.\n<color="green">Also pries out an installed prosthetic eye without breaking it.
"plasticforkdsc" = "我是说，把你自己或者你朋友的眼珠子戳出来，好腾出位置来装上那个超酷的义眼，这听起来很有趣对吧？一次性使用。\n\n<color=\"red\">在医疗面板中将其拖动到头部以移除生物眼睛。\n<color=\"green\">也可以在不损坏已安装义眼的情况下撬出义眼。"
# Original: Grappling Hook
"grapplinghook" = "抓钩枪"
# Original: A grappling hook device that can be fired to pull the player.
"grapplinghookdsc" = "一种可以发射抓钩把将玩家拉过去的装置。"
# Original: Scrap
"scrap" = "废料"
