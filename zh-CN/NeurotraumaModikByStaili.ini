"qol.host_auth.desc" = "开启时，主机仲裁所有症状变更。客户端仅渲染和请求治疗。"
# Original: Sync interval (sec)
"qol.sync_interval.label" = "同步间隔（秒）"
# Original: Seconds between periodic full-state broadcasts.
"qol.sync_interval.desc" = "定期全状态广播之间的秒数。"
# Original: Broadcast to all players
"qol.broadcast_all.label" = "广播给所有玩家"
# Original: When on, teammates see each other's afflictions and can treat them.
"qol.broadcast_all.desc" = "开启时，队友可看到彼此的症状并进行治疗。"
# Original: Verbose logging
"qol.verbose.label" = "详细日志"
# Original: Log every affliction add/tick/remove to BepInEx\LogOutput.log. Noisy.
"qol.verbose.desc" = "将每个症状的添加/更新/移除记录到BepInEx/LogOutput.log。日志轰炸。"
# Original: Frostbite
"af.frostbite.name" = "冻伤"
# Original: Cold-damaged tissue. Progresses in cold environments.
"af.frostbite.desc" = "寒冷损伤的组织。在寒冷环境中会恶化。"
# Original: Necrosis
"af.necrosis.name" = "坏死"
# Original: Dead tissue on a limb. Early stage (< 70%): cut away with a scalpel or any cutting tool (improvised bleeds more). Severe: amputation only. Returns if tetanus/frostbite/sepsis are not treated.
"af.necrosis.desc" = "肢体上的坏死组织。早期（<70%）：可用手术刀或任何切割工具切除（临时工具出血更多）。严重期：仅能截肢。若不治疗破伤风/冻伤/败血症会复发。"
# Original: Tetanus
"af.tetanus.name" = "破伤风"
# Original: Neurotoxin from dirty punctures — bites, spike traps, bear traps and other sharp wounds.
"af.tetanus.desc" = "来自脏污穿刺的神经毒素——咬伤、尖刺陷阱、捕兽夹及其他锐器伤口。"
# Original: Parasites
"af.parazite.name" = "寄生虫"
# Original: Parasites burrowed into an untreated porez4/5 foreign wound. Pull them out by hand (painful) or with tweezers. Anti-parasitic only prevents new burrows.
"af.parazite.desc" = "钻入未处理的异物伤口的寄生虫。用手忍痛拔出或用镊子。抗寄生虫药只能预防新钻入。"
# Original: Fever
"af.fever.name" = "发烧"
# Original: Systemic fever from cold, sickness or sepsis. Does not develop with good immunity (≥100%).
"af.fever.desc" = "由寒冷、疾病或败血症引起的全身性发热。免疫力良好（≥100%）时不会发展。"
# Original: antibiotics; combat injector (combatpen); helluce; keep immunity ≥100%
"af.fever.cures" = "抗生素；战斗注射器（combatpen）；helluce；保持免疫力≥100%"
# Original: Transfusion reaction
"af.wrongblood.name" = "输血反应"
# Original: Incompatible yellow blood. Adds to pulse/pressure; fever, kidney/liver stress, sickness.
"af.wrongblood.desc" = "不兼容的黄血。增加脉搏/血压；发烧、肝肾压力、反胃程度。"
# Original: Pneumothorax
"af.pneumothorax.name" = "气胸"
# Original: Air trapped between lung and chest wall. Requires chest drain.
"af.pneumothorax.desc" = "空气积聚在肺与胸壁之间。需要胸腔引流。"
# Original: Lung damage
"af.lungdamage.name" = "肺损伤"
# Original: Damaged alveoli. Reduces oxygenation and causes chronic cough.
"af.lungdamage.desc" = "肺泡受损。降低血氧饱和度并引起慢性咳嗽。"
# Original: Hyperventilation
"af.hyperventilation.name" = "过度换气"
# Original: Uncontrolled fast breathing. Anxiety-driven.
"af.hyperventilation.desc" = "无法控制的快速呼吸。由焦虑引起。"
# Original: Heart damage
"af.heartdamage.name" = "心脏损伤"
# Original: Damaged heart muscle. Permanently reduces cardiac performance until surgery. At 100% triggers vanilla cardiac arrest; unconsciousness follows vanilla vitals.
"af.heartdamage.desc" = "心肌受损。永久降低心脏功能，直至手术修复。达100%时触发原版心脏骤停。"
# Original: Seizure
"af.seizure.name" = "癫痫"
# Original: Uncontrolled electrical activity in the brain. Aim shakes badly; rarely the body twitches or ignores controls for a moment.
"af.seizure.desc" = "脑部无法控制的电活动。瞄准严重抖动；偶尔身体抽搐或短暂失去控制。"
# Original: Kidney damage
"af.kidneydamage.name" = "肾损伤"
# Original: Damage to kidney tissue. Reduces filtration and causes toxin buildup.
"af.kidneydamage.desc" = "肾组织受损。降低过滤功能，导致毒素累积。"
# Original: Kidney failure
"af.kidneyfailure.name" = "肾衰竭"
# Original: Kidneys have stopped filtering. Toxins accumulate rapidly.
"af.kidneyfailure.desc" = "肾脏已停止过滤。毒素快速累积。"
# Original: Chronic pain
"af.chronicpain.name" = "慢性疼痛"
# Original: Persistent pain from long-standing injuries or scar tissue.
"af.chronicpain.desc" = "由长期损伤或疤痕组织引起的持续性疼痛。"
# Original: inject morphine (each push: random ≤50 ml toward cure; careful of dependency)
"af.chronicpain.cures" = "注射吗啡（每次注射：随机≤50ml计入治疗；注意药物依赖）"
# Original: Psychosis
"af.psychosis.name" = "精神病"
# Original: Breakdown of contact with reality. Follows prolonged hallucinations.
"af.psychosis.desc" = "与现实脱节。在长期幻觉后出现。"
# Original: Hallucinations
"af.hallucinations.name" = "幻觉"
# Original: Perceiving things that are not there. Builds first; psychosis follows if left untreated.
"af.hallucinations.desc" = "感知不存在的事物。先积累；不治疗则会发展为精神病。"
# Original: Liver damage
"af.liverdamage.name" = "肝损伤"
# Original: Hepatocyte damage from alcohol, drugs, toxins or infection. Progressive; failure needs transplant.
"af.liverdamage.desc" = "肝细胞因酒精、药物、毒素或感染受损。进行性发展；衰竭需移植。"
# Original: Liver failure
"af.liverfailure.name" = "肝衰竭"
# Original: Liver can no longer clear toxins. Requires transplant.
"af.liverfailure.desc" = "肝脏无法清除毒素。需要移植。"
# Original: Cut (grade 1)
"af.porez1.name" = "切口（1级）"
# Original: Shallow incision. Bleeds a little, closes slowly on its own or with Medical suture.
"af.porez1.desc" = "浅表切口。少量出血，可缓慢自行闭合或用医用缝合线。"
# Original: Cut (grade 3, wide)
"af.porez3.name" = "切口（3级，开放）"
# Original: Wound held open with a Retractor. Required precondition for debridement / amputation / transplant / chest drain.
"af.porez3.desc" = "用拉钩保持开放的伤口。清创/截肢/移植/胸腔引流的前置条件。"
# Original: Cut with foreign body
"af.porez4_foreign.name" = "切口伴异物"
# Original: Laceration with something embedded inside. Won't close until removed with Scissors. Left untreated, parasites may burrow into this limb.
"af.porez4_foreign.desc" = "有异物嵌入的撕裂伤。需用手术剪取出才能闭合。长期不治疗，寄生虫可能钻入此肢体。"
# Original: Wide cut with foreign body
"af.porez5_foreign.name" = "开放切口伴异物"
# Original: Wide-open wound AND a foreign body inside. Extract first, then suture. Left untreated, parasites may burrow into this limb.
"af.porez5_foreign.desc" = "开放性伤口且内有异物。先取出再缝合。长期不治疗，寄生虫可能钻入此肢体。"
# Original: Fresh suture
"af.fresh_suture.name" = "新鲜缝合"
# Original: Recently stitched wound. Fades on its own in ~60s.
"af.fresh_suture.desc" = "刚缝合的伤口。约60秒后自行消失。"
# Original: Lung over-expansion
"af.lung_overexpand.name" = "肺过度扩张"
# Original: Alveoli forced open by rapid pressure change (nearby blast). Reduces breathing efficiency.
"af.lung_overexpand.desc" = "因快速气压变化（附近爆炸）被迫张开的肺泡。降低呼吸效率。"
# Original: Lung compression
"af.lung_compress.name" = "肺压迫"
# Original: Lungs squeezed by heavy liquid (oil) with no scuba gear. Blocks inhalation.
"af.lung_compress.desc" = "无潜水装备时被重液（石油）压迫的肺。阻塞吸气。"
# Original: Lung wall collapse
"af.lung_wall_collapse.name" = "肺壁塌陷"
# Original: Massive internal bleeding is buckling the lung walls inward. Bleeds worse and starves the blood of oxygen.
"af.lung_wall_collapse.desc" = "大量内出血导致肺壁向内塌陷。加重出血并降低血氧。"
# Original: Lung failure
"af.lungdamage_severe.name" = "肺衰竭"
# Original: Alveoli are failing (lung damage ≥ 70%). Oxygen mask required.
"af.lungdamage_severe.desc" = "肺泡功能衰竭（肺损伤≥70%）。需要氧气面罩。"
# Original: Kidney warning
"af.kidney_warning.name" = "肾脏警报"
# Original: Kidneys are struggling (organ damage 10–70%).
"af.kidney_warning.desc" = "肾脏功能困难（器官损伤10-70%）。"
# Original: Kidney failure
"af.kidney_deadlow.name" = "肾 衰 竭"
# Original: Kidneys have shut down (organ damage ≥ 70%). Toxins flood the blood; trauma builds up over time.
"af.kidney_deadlow.desc" = "肾脏已停摆（器官损伤≥70%）。毒素涌入血液，创伤随时间累积。"
# Original: Liver warning
"af.pechen_warning.name" = "肝脏警报"
# Original: Early liver strain (organ damage 10–40%). Often from drinking, overdose, sepsis or radiation.
"af.pechen_warning.desc" = "早期肝脏压力（器官损伤10-40%）。常由饮酒、过量、败血症或辐射引起。"
# Original: Liver warning — stage 2
"af.pechen_warning2.name" = "肝脏警报 — 2期"
# Original: Worsening liver damage (40–70%). Transition toward failure — stop alcohol and clear toxins now.
"af.pechen_warning2.desc" = "肝损伤恶化（40-70%）。正向衰竭过渡——立即停止饮酒并清除毒素。"
# Original: Liver failure
"af.pechen_dead.name" = "肝 衰 竭"
# Original: Liver has shut down (organ damage ≥ 70%). Toxins flood the blood; trauma builds. Transplant required.
"af.pechen_dead.desc" = "肝脏已停摆（器官损伤≥70%）。毒素涌入血液，创伤累积。需要移植。"
# Original: Chip fault — stage 1
"af.platadead1stadia.name" = "芯片故障 — 1期"
# Original: Oh… looks like a transistor burned out from something. UNI-HEALTH is starting to hiccup.
"af.platadead1stadia.desc" = "哦...好像某个晶体管烧了。UNI-HEALTH开始出现小故障。"
# Original: Chip fault — stage 2
"af.platadead2stadia.name" = "芯片故障 — 2期"
# Original: Uh-oh — this is getting more serious than usual. Half the board is glitching; vitals may lie.
"af.platadead2stadia.desc" = "糟糕——情况比平时严重。半块电路板在故障；生命体征可能不准。"
# Original: Chip fault — stage 3
"af.platadead3stadia.name" = "芯片故障 — 3期"
# Original: Critical board failure. At ≥99% a 10-minute self-destruct fuse arms — replace the chip or it explodes.
"af.platadead3stadia.desc" = "电路板严重故障。达≥99%时启动10分钟自毁倒计时——更换芯片否则爆炸。"
# Original: Frostbite — pre-amputation
"af.frostbite_amputation.name" = "冻伤 — 待截肢"
# Original: Extremity frozen through. Necrosis grows rapidly until the limb is amputated.
"af.frostbite_amputation.desc" = "肢体彻底冻透。坏死快速蔓延，直到截肢为止。"
# Original: Anti-parasitic prophylaxis
"af.antiparasite_guard.name" = "抗寄生虫预防"
# Original: Temporary protection — untreated porez4/5 wounds will not spawn new parasites while active.
"af.antiparasite_guard.desc" = "临时防护——激活时，未经处理的4/5级伤口不会产生新寄生虫。"
# Original: Liver graft
"af.liver_graft.name" = "肝移植"
# Original: Recent liver transplant. Infection risk is elevated until the graft settles.
"af.liver_graft.desc" = "近期肝移植。移植物稳定前感染风险升高。"
# Original: Liver sobriety
"af.liver_sober.name" = "肝脏戒酒"
# Original: Time without alcohol. Long abstinence allows the liver to recover.
"af.liver_sober.desc" = "无酒精时间。长期戒酒有助于肝脏恢复。"
# Original: Health chip
"af.healthchip.name" = "健康芯片"
# Original: Implanted health monitoring chip.
"af.healthchip.desc" = "植入式健康监测芯片。"
# Original: Chip damage
"af.chipdamage.name" = "芯片损坏"
# Original: Damage to the implanted health chip. Causes UNI-HEALTH readout errors.
"af.chipdamage.desc" = "植入健康芯片受损。导致健康读数错误。"
# Original: Chip fuse
"af.chip_fuse.name" = "芯片自毁引信"
# Original: Seconds left before the implant self-destructs.
"af.chip_fuse.desc" = "植入物自毁倒计时。"
# Original: Scalpel
"item.nt_scalpel.name" = "手术刀"
# Original: Precise cutting instrument. Removes early necrotic tissue on an unconscious patient.
"item.nt_scalpel.desc" = "精密切割工具。可在无意识患者身上切除早期坏死组织。"
# Original: Bone saw
"item.nt_bonesaw.name" = "骨锯"
# Original: Amputation and heavy tissue work.
"item.nt_bonesaw.desc" = "用于截肢和大型组织手术。"
# Original: Retractor
"item.nt_retractor.name" = "伤口拉钩"
# Original: Holds a surgical wound open. Required for internal procedures.
"item.nt_retractor.desc" = "保持手术切口开放。内部手术的必需工具。"
# Original: Scissors
"item.nt_scissors.name" = "手术剪"
# Original: Fine surgical scissors. Extract foreign bodies from wounds, and eject serum from an oxygen condenser (any hammering tool also works).
"item.nt_scissors.desc" = "精细手术剪。可从伤口中取出异物，也可从氧气浓缩器中弹出血清（任何锤击工具同样可以）。"
# Original: Anesthetic serum
"item.nt_serum_sleep.name" = "麻醉血清"
# Original: Ampoule of anesthetic charge for the O2 condenser. Drag onto the condenser to load (like a battery). Does nothing by itself. Scissors or any hammer eject the charge back as an ampoule.
"item.nt_serum_sleep.desc" = "氧气浓缩器的麻醉剂安瓿。拖放到浓缩器上即可装载。单独使用无效果。"
# Original: O2 condenser
"item.nt_o2_condenser.name" = "氧气浓缩器"
# Original: Reusable oxygen device. Empty, it restores blood oxygen and clears hyperventilation. With serum loaded, applying it also anesthetizes the patient for surgery. Serum inserts like a battery (does not repair the device); scissors or any hammer eject.
"item.nt_o2_condenser.desc" = "可重复使用的氧气设备。空载时恢复血氧并清除过度换气。装载血清后使用可麻醉患者进行手术。"
# Original: Anti-parasitic
"item.nt_antiparasite.name" = "抗寄生虫药"
# Original: 3-dose vial. Prophylaxis: while active, untreated foreign-body wounds will not spawn new parasites. Does not remove ones already burrowed — pull those out by hand or tweezers. Also lowers blood sickness / sepsis; costs liver health; after transplant speeds graft settling.
"item.nt_antiparasite.desc" = "3剂量药瓶。预防：激活时未处理的异物伤口不会产生新寄生虫。降低血液感染/败血症；消耗肝脏健康；移植后加速移植物稳定。"
# Original: Important chip
"item.nt_important_chip.name" = "重要芯片"
# Original: Replacement board for the implanted health chip. Craft from a circuit board (>=90% condition) and string. Apply to clear chip faults.
"item.nt_important_chip.desc" = "植入健康芯片的替换电路板。用电路板（≥90%状况）加线制作。使用可清除芯片故障。"
# Original: Blood pack (O+)
"item.nt_bloodtype_op.name" = "血袋（O+）"
# Original: Yellow blood pack typed O+. Used for blood transfusion. Craft: blood bag + 20 mL alien blood.
"item.nt_bloodtype_op.desc" = "O+型血袋。用于输血。制作：血袋 + 20mL 外星血液。"
# Original: Blood pack (O-)
"item.nt_bloodtype_om.name" = "血袋（O-）"
# Original: Yellow blood pack typed O-. Used for blood transfusion. Craft: blood bag + 20 mL alien blood.
"item.nt_bloodtype_om.desc" = "O-型血袋。用于输血。制作：血袋 + 20mL 外星血液。"
# Original: Blood pack (A+)
"item.nt_bloodtype_ap.name" = "血袋（A+）"
# Original: Yellow blood pack typed A+. Used for blood transfusion. Craft: blood bag + 20 mL alien blood.
"item.nt_bloodtype_ap.desc" = "A+型血袋。用于输血。制作：血袋 + 20mL 外星血液。"
# Original: Blood pack (A-)
"item.nt_bloodtype_am.name" = "血袋（A-）"
# Original: Yellow blood pack typed A-. Used for blood transfusion. Craft: blood bag + 20 mL alien blood.
"item.nt_bloodtype_am.desc" = "A-型血袋。用于输血。制作：血袋 + 20mL 外星血液。"
# Original: Blood pack (B+)
"item.nt_bloodtype_bp.name" = "血袋（B+）"
# Original: Yellow blood pack typed B+. Used for blood transfusion. Craft: blood bag + 20 mL alien blood.
"item.nt_bloodtype_bp.desc" = "B+型血袋。用于输血。制作：血袋 + 20mL 外星血液。"
# Original: Blood pack (B-)
"item.nt_bloodtype_bm.name" = "血袋（B-）"
# Original: Yellow blood pack typed B-. Used for blood transfusion. Craft: blood bag + 20 mL alien blood.
"item.nt_bloodtype_bm.desc" = "B-型血袋。用于输血。制作：血袋 + 20mL 外星血液。"
# Original: Blood pack (AB+)
"item.nt_bloodtype_abp.name" = "血袋（AB+）"
# Original: Yellow blood pack typed AB+. Used for blood transfusion. Craft: blood bag + 20 mL alien blood.
"item.nt_bloodtype_abp.desc" = "AB+型血袋。用于输血。制作：血袋 + 20mL 外星血液。"
# Original: Blood pack (AB-)
"item.nt_bloodtype_abm.name" = "血袋（AB-）"
# Original: Yellow blood pack typed AB-. Used for blood transfusion. Craft: blood bag + 20 mL alien blood.
"item.nt_bloodtype_abm.desc" = "AB-型血袋。用于输血。制作：血袋 + 20mL 外星血液。"
[Console]
"Neurotrauma: list afflictions on target. Usage: nt_list [player]." = "【Neurotrauma】列出目标身上的症状。用法 : nt_list [玩家名]"
"Neurotrauma: add affliction severity. Usage: nt_add <id> [amount=50] [player] [#limb]." = "【Neurotrauma】增加症状严重度。用法 : nt_add <ID> [数值=50] [玩家名] [肢体]"
"Neurotrauma: set affliction severity. Usage: nt_set <id> <amount> [player] [#limb]." = "【Neurotrauma】设置症状严重度。用法 : nt_set <ID> <数值> [玩家名] [肢体]"
"Neurotrauma: clear affliction(s). Usage: nt_clear [id] [player] [#limb]." = "【Neurotrauma】清除症状。用法 : nt_clear [ID] [玩家名] [肢体]"
"Neurotrauma: print target/netid diagnostics. Usage: nt_diag [player]." = "【Neurotrauma】打印目标/网络ID诊断信息。用法 : nt_diag [玩家名]"
"Neurotrauma: list body parts (limb indices) of the target. Usage: nt_limbs [player]." = "【Neurotrauma】列出目标的身体部位（肢体索引）。用法 : nt_limbs [玩家名]"
"Neurotrauma: show or set your blood type. Usage: nt_bloodtype [A+|B+|O+|AB+|…|random]." = "【Neurotrauma】显示或设置血型。用法 : nt_bloodtype [A+|B+|O+|AB+|…|random]"
"player" = "玩家"
"optional MP player name" = "（可选）多人玩家名称"
"id" = "ID"
"affliction id" = "症状 ID"
"affliction id (omit to clear all)" = "症状 ID（省略以清除全部）"
"amount" = "数值"
"0..100, default 50" = "0..100（默认 50）"
"0..100" = "0..100"
"#limb" = "肢体"
"optional body part: #sel, #head, #lower, #lhand, #lfoot, #<index>..." = "（可选）身体部位 : #sel选定、#head头、#lower下身、#lhand左手、#lfoot左脚、#<索引>..."
"optional body part" = "（可选）身体部位"
"type" = "类型"
"blood type (A+, O-, …) or random; omit to print current" = "血型（A+、O- 等）或 random；省略以显示当前血型"