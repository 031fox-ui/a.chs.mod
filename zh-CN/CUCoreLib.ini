[概要]
"GUID" = "net.cucorelib"
"翻译版本" = "1.0.0"
"模组版本" = "1.0.3"
[Console]
"Spawns all items from a given loot pool with zero gravity." = "【CUCoreLib】从指定战利品池中生成所有物品（零重力）"
"Spawns a vanilla prefab or CUCoreLib-registered item/building." = "【CUCoreLib】生成原版预设物体或 CUCoreLib 注册的物品/建筑"
"Places a vanilla or CUCoreLib-registered tile at the chosen block position." = "【CUCoreLib】在指定方块位置放置原版或 CUCoreLib 注册的物块"
"Writes or updates CUCoreLib generated locale data. WARNING: Overrides EN.json" = "【CUCoreLib】写入或更新 CUCoreLib 生成的本地化数据。警告 : 会覆盖 EN.json"
"Prints the loaded BepInEx plugin list to the in-game console and Unity log." = "【CUCoreLib】将已加载的 BepInEx 插件列表打印到游戏内控制台和 Unity 日志"
"Strictly reloads item/liquid/recipe/locale content from a rebuilt mod DLL." = "【CUCoreLib】从重新构建的模组 DLL 严格重载物品/液体/配方/本地化内容"
"Enables automatic hot reloading after detecting a loaded mod DLL file change." = "【CUCoreLib】检测到已加载模组 DLL 文件变化后启用自动热重载"
"Manages a live top-right overlay of watched static fields for runtime debugging." = "【CUCoreLib】管理运行时调试的右上角静态字段监视覆盖层"
"category" = "类别"
"The ID of the category to spawn from." = "要生成物品的类别 ID"
"position" = "位置"
"Where to spawn the item" = "物品生成位置"
"Spawn position." = "生成位置"
"Tile position." = "地块位置"
"modGUID" = "模组GUID"
"Optional BepInEx plugin GUID filter for the modded category. Use normal for no filter." = "（可选）模组类别的 BepInEx 插件 GUID 过滤器。使用 normal 表示不过滤"
"id" = "ID"
"Item or object ID." = "物品或对象 ID"
"condition" = "耐久"
"Item condition." = "物品耐久"
"count" = "数量"
"Number of objects to spawn." = "要生成的对象数量"
"tileIndex" = "地块索引"
"Vanilla or registered custom tile index." = "原版或注册的自定义地块索引"
"path" = "路径"
"Optional output path. Defaults to BepInEx/config/CUCoreLib/Locales/EN.json." = "（可选）输出路径。默认为 BepInEx/config/CUCoreLib/Locales/EN.json"
"modGuid" = "模组GUID"
"BepInEx plugin GUID to strictly reload from a rebuilt DLL." = "要从重新构建的 DLL 严格重载的 BepInEx 插件 GUID"
"BepInEx plugin GUID that previously called ContentReloadManager.EnableHotReload(GUID)." = "先前调用过 ContentReloadManager.EnableHotReload(GUID) 的 BepInEx 插件 GUID"
"enable" = "启用"
"true to enable watch mode for that DLL, false to disable it." = "true 启用该 DLL 的监视模式，false 禁用它"
"action" = "操作"
"add, remove, list, clear, show, or hide." = "add添加、remove移除、list列出、clear清除、show显示 或 hide隐藏"
"Type.member" = "类型.成员"
"Reflected static field to watch, such as Namespace.Plugin.healthRate." = "要监视的反射静态字段，例如 Namespace.Plugin.healthRate"
"created locale at " = ""已创建本地化文件于 "  # 动态路径拼接，前缀匹配"
"Debug watch overlay hidden." = "调试监视覆盖层已隐藏"
"Debug watch overlay shown." = "调试监视覆盖层已显示"
"Cleared all debug watches." = "已清除所有调试监视"
"No active debug watches." = "没有活跃的调试监视"
"Reloaded " = ""已重载 "  # "Reloaded {filename}!" 前缀匹配"
"Spawned all items from category \"{0}\" at {1}." = "已在 {1} 生成类别「{0}」的所有物品"
"Placed tile {0} ({1}) at {2},{3}." = "已在 {2},{3} 放置地块 {0}（{1}）"
"Loaded mods ({0}):" = "已加载的模组（共 {0} 个） : "
"Active debug watches ({0}) - overlay {1}:" = "活跃的调试监视（{0} 个）- 覆盖层 : {1}"
"Usage: spawncategory [category] [position] [modGUID]" = "用法 : spawncategory [类别] [位置] [模组GUID]"
"Usage: cuspawn [id]" = "用法 : cuspawn [ID]"
"Usage: settile [tileIndex] [position]" = "用法 : settile [地块索引] [位置]"
"Usage: reloadcontent [modGuid]" = "用法 : reloadcontent [模组GUID]"
"Usage: autohotreload [modGuid] [enable]" = "用法 : autohotreload [模组GUID] [启用]"
"Usage: debugwatch [add|remove|list|clear|show|hide] [Type.member]" = "用法 : debugwatch [add|remove|list|clear|show|hide] [类型.成员]"
"Usage: debugwatch add [Type.member]" = "用法 : debugwatch add [类型.成员]"
"Usage: debugwatch remove [Type.member]" = "用法 : debugwatch remove [类型.成员]"
"Invalid item category \"{0}\"." = "无效的物品类别「{0}」"
"Could not find entity '{0}'." = "找不到实体「{0}」"
"'{0}' is not a valid tile index." = "「{0}」不是有效的地块索引"
"Tile index '{0}' is not registered." = "地块索引「{0}」未注册"
"Failed to place tile '{0}' at block {1}." = "在方块 {1} 放置地块「{0}」失败"
"Enable must be 'true' or 'false'." = "启用值必须为 true 或 false"
"Unknown debugwatch action '{0}'." = "未知的 debugwatch 操作「{0}」"