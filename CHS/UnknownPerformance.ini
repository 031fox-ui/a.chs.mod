# Original: Playground Visual Style
"gamesetPerf_Playground_Sprites" = "Playground 视觉风格"
# Original: Absurdly simplifies game sprites and world elements. Flat Silhouette keeps shapes but strips textures into solid average colors. Flat Blocks turns everything into literal colored rectangles.
"gamesetPerf_Playground_Spritesdsc" = "【“Playground”不知道怎么翻译，意思大概就是“简化画面模式”，完全不推荐修改，保持默认：关闭（原生细节），修改要恢复可能要重启游戏】\n\n极度简化游戏贴图和场景元素。“平坦轮廓”保留物体形状，但会剥离纹理并填充为单一的平均色。“平坦方块”会将所有内容替换为纯色矩形。"
# Original: Off (Native Detail)
"gamesetPerf_Playground_SpritesOff" = "关闭\n（原生细节）"
# Original: Flat Silhouette (Playground)
"gamesetPerf_Playground_SpritesFlat Shapes" = "平坦轮廓\n（Playground）"
# Original: Flat Blocks (Extremely Fast)
"gamesetPerf_Playground_SpritesFlat Blocks" = "平坦方块\n（极速）"
# Original: Disable Foliage & Decor
"gamesetPerf_Playground_Foliage" = "禁用植被与装饰"
# Original: Completely disables small decorative grass, vines, foliage, debris, and blood splatters. Gives the world a clean, minimalist playground style and improves CPU/GPU performance.
"gamesetPerf_Playground_Foliagedsc" = "完全禁用小型装饰性的草、藤蔓、植被、碎屑和血迹。\n赋予世界干净、极简的“Playground”风格，并提高 CPU/GPU 性能。"
# Original: LOS Refresh Interval
"gamesetPerf_LOS_Speed" = "视线检测间隔"
# Original: Controls how frequently Line Of Sight checks are performed for AI. Higher intervals significantly improve FPS in crowded areas, with minor visual delay.
"gamesetPerf_LOS_Speeddsc" = "控制 AI 进行视线（LOS）检测的频率。延长刷新间隔可显著提升拥挤区域的帧率，但会产生轻微的视觉延迟。"
# Original: Every Frame (Heavy)
