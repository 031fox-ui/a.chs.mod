# Original: Every 3 Frames (Ultra)
"gamesetPerf_LOS_SpeedEvery 3 Frames" = "每 3 帧（极致）"
# Original: Every 4 Frames (Extreme)
"gamesetPerf_LOS_SpeedEvery 4 Frames" = "每 4 帧（极限）"
